##
# NYSM — Nginx C2 Redirector Configuration
# Placeholders substituted by automate.sh:
#   <DOMAIN_NAME>  — FQDN for this redirector
#   <C2_SERVER>    — backend C2 in IP:Port format
#   <C2_SCHEME>    — http or https
#   <UA_PATTERN>   — regex passed to the user-agent filter (optional)
##

# ─── IP Blocklist (populated by blocklist-update.sh) ─────────────────────────
include /etc/nginx/blocklist.conf;

# ─── Rate limiting ────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=beacon:10m rate=10r/s;

# ─── C2 upstream (with optional failover) ────────────────────────────────────
upstream c2_backend {
    server <C2_SERVER>;
    # Uncomment to add a hot-standby failover:
    # server <BACKUP_C2_SERVER> backup;
    keepalive 32;
}

# ─── NYSM_HTTP_START ─────────────────────────────────────────────────────────
# HTTP — initial proxy block (pre-cert).
# automate.sh removes this entire section (between NYSM_HTTP_START and
# NYSM_HTTP_END) once the SSL certificate has been obtained, leaving only the
# redirect block and the HTTPS proxy block below.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name <DOMAIN_NAME>;

    root  /var/www/html;
    index index.html index.htm;

    server_tokens off;

    #UA_FILTER# if ($http_user_agent !~* "<UA_PATTERN>") { return 301 https://www.microsoft.com; }

    location / {
        try_files $uri $uri/ @c2;
    }

    location ~ \.php$ {
        try_files $uri @c2;
        fastcgi_pass  unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    location @c2 {
        limit_req zone=beacon burst=20 nodelay;

        proxy_pass         <C2_SCHEME>://c2_backend;
        proxy_redirect     off;
        proxy_ssl_verify   off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP         $remote_addr;

        proxy_connect_timeout  10s;
        proxy_read_timeout     90s;
        proxy_send_timeout     30s;

        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
        proxy_hide_header  Via;
        proxy_hide_header  X-Forwarded-Server;

        error_page 502 503 504 /maintenance.html;
    }

    location = /maintenance.html {
        root     /var/www/html;
        internal;
    }
}
# ─── NYSM_HTTP_END ───────────────────────────────────────────────────────────

# ─── HTTP → HTTPS redirect (activated post-cert by automate.sh) ──────────────
